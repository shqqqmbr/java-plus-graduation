spring:
  datasource:
    url: jdbc:postgresql://stats-db:5432/stats
    username: stats
    password: stats
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    properties:
      hibernate:
        default_schema: public
        format_sql: true

logging:
  level:
    ru.practicum.ewm: DEBUG

analyzer:
  kafka:
    user-action-consumer-props:
      bootstrapServers: "localhost:9092"
      groupId: "analyzer-group"
      keyDeserializer: org.apache.kafka.common.serialization.LongDeserializer
      valueDeserializer: ru.practicum.stats.avro.UserActionDeserializer
      enableAutoCommit: "false"
      autoOffsetReset: "earliest"
    event-similarity-consumer-props:
      bootstrapServers: "localhost:9092"
      groupId: "analyzer-group"
      keyDeserializer: org.apache.kafka.common.serialization.LongDeserializer
      valueDeserializer: ru.practicum.stats.avro.EventSimilarityDeserializer
      enableAutoCommit: "false"
      autoOffsetReset: "earliest"
    userActionsTopic: "stats.user-actions.v1"
    eventsSimilarityTopic: "stats.events-similarity.v1"