spring:
  application:
    name: stats-server
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none

    properties:
      hibernate.hibernate.format_sql: true

  datasource:
    username: "dbuser"
    password: "12345"
    url: jdbc:postgresql://localhost:6432/stats
    driver-class-name: "org.postgresql.Driver"

  sql:
    init:
      mode: always

server:
  port: 9090
